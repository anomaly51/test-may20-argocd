apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: gitops-apps
  namespace: argocd
spec:
  description: Generic project for applications managed by this GitOps repository.
  sourceRepos:
    - https://github.com/anomaly51/test-may20-argocd.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: "*"
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
